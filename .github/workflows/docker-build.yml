name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Extract spawner metadata
        id: meta-spawner
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-spawner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Extract inventory simulator metadata
        id: meta-inventory-simulator
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-inventory-simulator
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push spawner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.spawner
          push: true
          tags: ${{ steps.meta-spawner.outputs.tags }}
          labels: ${{ steps.meta-spawner.outputs.labels }}
          cache-from: type=gha,scope=spawner
          cache-to: type=gha,mode=max,scope=spawner

      - name: Build and push inventory simulator image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.inventory-simulator
          push: true
          tags: ${{ steps.meta-inventory-simulator.outputs.tags }}
          labels: ${{ steps.meta-inventory-simulator.outputs.labels }}
          cache-from: type=gha,scope=inventory-simulator
          cache-to: type=gha,mode=max,scope=inventory-simulator
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_PATH}"
          test -n "${DEPLOY_SSH_KEY}"
          test -n "${DEPLOY_USER}"
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Prepare compose and nginx on server
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            DEPLOY_PATH="${DEPLOY_PATH}" \
            WEB_IMAGE="ghcr.io/${{ github.repository }}-web:latest" \
            SPAWNER_IMAGE="ghcr.io/${{ github.repository }}-spawner:latest" \
            INVENTORY_IMAGE="ghcr.io/${{ github.repository }}-inventory-simulator:latest" \
            'bash -s' <<'REMOTE'
          set -euo pipefail
          mkdir -p "${DEPLOY_PATH}/nginx/conf.d"
          cd "${DEPLOY_PATH}"

          if [ ! -f .env ]; then
            python3 - <<'PY'
          import os
          import secrets
          import subprocess

          def container_env(container):
              try:
                  output = subprocess.check_output(
                      [
                          "docker",
                          "inspect",
                          "--format",
                          "{{range .Config.Env}}{{println .}}{{end}}",
                          container,
                      ],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return {}
              values = {}
              for line in output.splitlines():
                  if "=" in line:
                      key, value = line.split("=", 1)
                      values[key] = value
              return values

          def dotenv_quote(value):
              return '"' + value.replace("\\", "\\\\").replace('"', '\\"').replace("\n", "\\n") + '"'

          web = container_env("xn-web")
          spawner = container_env("xn-spawner")
          inventory = container_env("inventory")
          mysql = container_env("cs2-mysql")
          postgres = container_env("postgres")
          redis = container_env("xn-redis")
          mysql_root_password = mysql.get("MYSQL_ROOT_PASSWORD", secrets.token_urlsafe(32))
          db_name = mysql.get("MYSQL_DATABASE") or web.get("DB_NAME") or "cs2db"
          if db_name == "cs2_skins" and not mysql.get("MYSQL_DATABASE"):
              db_name = "cs2db"
          db_user = mysql.get("MYSQL_USER") or web.get("DB_USER") or "cs2"
          if db_user == "root":
              db_user = "cs2"
          db_password = (
              mysql.get("MYSQL_PASSWORD")
              or (web.get("DB_PASSWORD") if web.get("DB_USER") == db_user else "")
              or secrets.token_hex(24)
          )
          server_secret = (
              web.get("SERVER_SECRET_KEY")
              or spawner.get("SERVER_SECRET_KEY")
              or secrets.token_urlsafe(32)
          )
          redis_password = redis.get("REDIS_PASSWORD") or secrets.token_hex(24)
          redis_url = (
              web.get("REDIS_URL")
              or spawner.get("REDIS_URL")
              or f"redis://:{redis_password}@redis:6379/0"
          )

          api_key = (
              web.get("XN_INV_API_AUTH_KEY")
              or inventory.get("XN_INV_API_AUTH_KEY")
              or web.get("THIRD_PARTY_SECRET")
              or inventory.get("THIRD_PARTY_SECRET")
              or secrets.token_urlsafe(32)
          )

          values = {
              "WEB_IMAGE": os.environ["WEB_IMAGE"],
              "SPAWNER_IMAGE": os.environ["SPAWNER_IMAGE"],
              "INVENTORY_IMAGE": os.environ["INVENTORY_IMAGE"],
              "NEXTAUTH_URL": web.get("NEXTAUTH_URL", "https://xomnghien.com"),
              "NEXTAUTH_SECRET": web.get("NEXTAUTH_SECRET", secrets.token_urlsafe(32)),
              "SESSION_SECRET": web.get("SESSION_SECRET") or web.get("NEXTAUTH_SECRET") or secrets.token_urlsafe(32),
              "SERVER_SECRET_KEY": server_secret,
              "STEAM_API_KEY": web.get("STEAM_API_KEY") or inventory.get("STEAM_API_KEY", ""),
              "DB_HOST": "mysql",
              "DB_PORT": web.get("DB_PORT") or mysql.get("MYSQL_TCP_PORT") or "3306",
              "DB_USER": db_user,
              "DB_PASSWORD": db_password,
              "DB_NAME": db_name,
              "MYSQL_ROOT_PASSWORD": mysql_root_password,
              "REDIS_PASSWORD": redis_password,
              "REDIS_URL": redis_url,
              "POSTGRES_USER": postgres.get("POSTGRES_USER", "postgres"),
              "POSTGRES_PASSWORD": postgres.get("POSTGRES_PASSWORD", "postgres"),
              "POSTGRES_DB": postgres.get("POSTGRES_DB", "postgres"),
              "INVENTORY_DATABASE_URL": inventory.get(
                  "DATABASE_URL",
                  "postgres://postgres:postgres@postgres:5432/postgres?schema=public",
              ),
              "INVENTORY_SESSION_SECRET": inventory.get("SESSION_SECRET", secrets.token_urlsafe(32)),
              "INVENTORY_PUBLIC_URL": "https://inventory.xomnghien.com",
              "INVENTORY_INTERNAL_URL": "http://inventory:3000",
              "INVENTORY_STEAM_CALLBACK_URL": "https://inventory.xomnghien.com/sign-in/steam/callback",
              "INVENTORY_ASSETS_BASE_URL": inventory.get("ASSETS_BASE_URL", ""),
              "CLOUDFLARE_ANALYTICS_TOKEN": inventory.get("CLOUDFLARE_ANALYTICS_TOKEN", ""),
              "XN_INV_API_AUTH_KEY": api_key,
          }

          with open(".env", "w", encoding="utf-8") as env_file:
              for key, value in values.items():
                  env_file.write(f"{key}={dotenv_quote(str(value))}\n")
          PY
            chmod 600 .env
          fi

          python3 - <<'PY'
          from pathlib import Path
          import ast
          import os
          import secrets

          path = Path(".env")
          values = {}
          order = []

          if path.exists():
              for line in path.read_text(encoding="utf-8").splitlines():
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  key = key.strip()
                  value = value.strip()
                  try:
                      parsed = ast.literal_eval(value) if value[:1] in {"'", '"'} else value
                  except Exception:
                      parsed = value.strip('"').strip("'")
                  if key not in values:
                      order.append(key)
                  values[key] = str(parsed)

          def quote(value):
              return '"' + str(value).replace("\\", "\\\\").replace('"', '\\"').replace("\n", "\\n") + '"'

          def set_value(key, value):
              if key not in values:
                  order.append(key)
              values[key] = str(value)

          set_value("WEB_IMAGE", os.environ["WEB_IMAGE"])
          set_value("SPAWNER_IMAGE", os.environ["SPAWNER_IMAGE"])
          set_value("INVENTORY_IMAGE", os.environ["INVENTORY_IMAGE"])

          if values.get("DB_NAME") in {"", None, "cs2_skins"}:
              set_value("DB_NAME", "cs2db")
          if values.get("DB_USER") in {"", None, "root"}:
              set_value("DB_USER", "cs2")
              set_value("DB_PASSWORD", secrets.token_hex(24))
          elif not values.get("DB_PASSWORD"):
              set_value("DB_PASSWORD", secrets.token_hex(24))
          if not values.get("MYSQL_ROOT_PASSWORD"):
              set_value("MYSQL_ROOT_PASSWORD", secrets.token_hex(24))
          if not values.get("SERVER_SECRET_KEY"):
              set_value("SERVER_SECRET_KEY", secrets.token_urlsafe(32))
          if not values.get("REDIS_PASSWORD"):
              set_value("REDIS_PASSWORD", secrets.token_hex(24))
          if not values.get("REDIS_URL") or values.get("REDIS_URL") == "redis://redis:6379/0":
              set_value("REDIS_URL", f"redis://:{values['REDIS_PASSWORD']}@redis:6379/0")
          if not values.get("NEXTAUTH_SECRET"):
              set_value("NEXTAUTH_SECRET", secrets.token_urlsafe(32))
          if not values.get("SESSION_SECRET"):
              set_value("SESSION_SECRET", values["NEXTAUTH_SECRET"])
          if not values.get("INVENTORY_SESSION_SECRET"):
              set_value("INVENTORY_SESSION_SECRET", secrets.token_urlsafe(32))
          if not values.get("XN_INV_API_AUTH_KEY"):
              set_value("XN_INV_API_AUTH_KEY", secrets.token_urlsafe(32))
          if not values.get("POSTGRES_USER"):
              set_value("POSTGRES_USER", "postgres")
          if not values.get("POSTGRES_PASSWORD"):
              set_value("POSTGRES_PASSWORD", secrets.token_hex(24))
          if not values.get("POSTGRES_DB"):
              set_value("POSTGRES_DB", "postgres")
          if not values.get("STEAM_WEB_API_KEY") and values.get("STEAM_API_KEY"):
              set_value("STEAM_WEB_API_KEY", values["STEAM_API_KEY"])

          defaults = {
              "NODE_ENV": "production",
              "DB_HOST": "mysql",
              "DB_PORT": "3306",
              "SPAWNER_PORT": "3002",
              "PGDATA": "/var/lib/postgresql/data/pgdata",
              "INVENTORY_PUBLIC_URL": "https://inventory.xomnghien.com",
              "INVENTORY_INTERNAL_URL": "http://inventory:3000",
              "INVENTORY_STEAM_CALLBACK_URL": "https://inventory.xomnghien.com/sign-in/steam/callback",
              "INVENTORY_SERVICE_URL": "https://inventory.xomnghien.com",
          }
          for key, value in defaults.items():
              if not values.get(key):
                  set_value(key, value)
          if not values.get("INVENTORY_DATABASE_URL"):
              set_value(
                  "INVENTORY_DATABASE_URL",
                  f"postgres://{values['POSTGRES_USER']}:{values['POSTGRES_PASSWORD']}@postgres:5432/{values['POSTGRES_DB']}?schema=public",
              )

          required = [
              "NEXTAUTH_SECRET",
              "SESSION_SECRET",
              "SERVER_SECRET_KEY",
              "STEAM_API_KEY",
              "DB_HOST",
              "DB_PORT",
              "DB_USER",
              "DB_PASSWORD",
              "DB_NAME",
              "MYSQL_ROOT_PASSWORD",
              "POSTGRES_PASSWORD",
              "INVENTORY_DATABASE_URL",
              "INVENTORY_SESSION_SECRET",
              "XN_INV_API_AUTH_KEY",
              "REDIS_PASSWORD",
              "REDIS_URL",
          ]
          missing = [key for key in required if not values.get(key)]
          if missing:
              raise SystemExit("Missing required deploy env keys: " + ", ".join(missing))

          path.write_text("".join(f"{key}={quote(values[key])}\n" for key in order if key in values), encoding="utf-8")
          path.chmod(0o600)

          env_dir = Path("env")
          env_dir.mkdir(mode=0o700, exist_ok=True)

          def write_env(filename, keys):
              lines = []
              for key, source in keys:
                  env_key = key
                  value_key = source or key
                  if value_key in values:
                      lines.append(f"{env_key}={quote(values[value_key])}\n")
              target = env_dir / filename
              target.write_text("".join(lines), encoding="utf-8")
              target.chmod(0o600)

          oauth_keys = [
              ("GOOGLE_CLIENT_ID", None),
              ("GOOGLE_CLIENT_SECRET", None),
              ("DISCORD_CLIENT_ID", None),
              ("DISCORD_CLIENT_SECRET", None),
              ("GITHUB_CLIENT_ID", None),
              ("GITHUB_CLIENT_SECRET", None),
              ("STEAM_WEB_API_KEY", None),
          ]

          write_env(
              "web.env",
              [
                  ("NODE_ENV", None),
                  ("NEXTAUTH_URL", None),
                  ("NEXTAUTH_SECRET", None),
                  ("SESSION_SECRET", None),
                  ("SERVER_SECRET_KEY", None),
                  ("STEAM_API_KEY", None),
                  ("REDIS_URL", None),
                  ("DB_HOST", None),
                  ("DB_PORT", None),
                  ("DB_USER", None),
                  ("DB_PASSWORD", None),
                  ("DB_NAME", None),
                  ("INVENTORY_PUBLIC_URL", None),
                  ("INVENTORY_INTERNAL_URL", None),
                  ("INVENTORY_SERVICE_URL", "INVENTORY_PUBLIC_URL"),
                  ("XN_INV_API_AUTH_KEY", None),
                  *oauth_keys,
              ],
          )

          write_env(
              "spawner.env",
              [
                  ("NODE_ENV", None),
                  ("PORT", "SPAWNER_PORT"),
                  ("SPAWNER_PORT", None),
                  ("SERVER_SECRET_KEY", None),
                  ("STEAM_API_KEY", None),
                  ("STEAM_WEB_API_KEY", None),
                  ("REDIS_URL", None),
                  ("DB_HOST", None),
                  ("DB_PORT", None),
                  ("DB_USER", None),
                  ("DB_PASSWORD", None),
                  ("DB_NAME", None),
              ],
          )

          write_env(
              "inventory.env",
              [
                  ("NODE_ENV", None),
                  ("DATABASE_URL", "INVENTORY_DATABASE_URL"),
                  ("SESSION_SECRET", "INVENTORY_SESSION_SECRET"),
                  ("STEAM_API_KEY", None),
                  ("STEAM_CALLBACK_URL", "INVENTORY_STEAM_CALLBACK_URL"),
                  ("CLOUDFLARE_ANALYTICS_TOKEN", None),
                  ("ASSETS_BASE_URL", "INVENTORY_ASSETS_BASE_URL"),
                  ("XN_INV_API_AUTH_KEY", None),
                  ("XN_INV_PUBLIC_URL", "INVENTORY_PUBLIC_URL"),
              ],
          )

          write_env(
              "mysql.env",
              [
                  ("MYSQL_ROOT_PASSWORD", None),
                  ("MYSQL_DATABASE", "DB_NAME"),
                  ("MYSQL_USER", "DB_USER"),
                  ("MYSQL_PASSWORD", "DB_PASSWORD"),
              ],
          )

          write_env(
              "postgres.env",
              [
                  ("POSTGRES_USER", None),
                  ("POSTGRES_PASSWORD", None),
                  ("POSTGRES_DB", None),
                  ("PGDATA", None),
              ],
          )

          write_env(
              "redis.env",
              [
                  ("REDIS_PASSWORD", None),
              ],
          )
          PY

          if [ -f nginx.conf ]; then
            python3 - <<'PY'
          from pathlib import Path
          import json
          import os
          import re
          import shutil
          import time
          import subprocess

          source = Path("nginx.conf")
          conf_dir = Path("nginx/conf.d")
          backup_dir = Path("nginx/backups")
          backup_dir.mkdir(parents=True, exist_ok=True)
          marker = Path("nginx/.split-from-monolith")
          if not marker.exists():
              shutil.copy2(source, backup_dir / f"nginx.conf.{int(time.time())}.bak")

          def docker_network_aliases():
              try:
                  raw = subprocess.check_output(
                      ["docker", "network", "inspect", "shared-network"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  )
              except subprocess.CalledProcessError:
                  return set()
              aliases = {"127.0.0.1", "localhost"}
              for network in json.loads(raw):
                  for container in network.get("Containers", {}).values():
                      name = container.get("Name")
                      if name:
                          aliases.add(name)
                      for alias in container.get("Aliases") or []:
                          aliases.add(alias)
              return aliases

          available_aliases = docker_network_aliases()

          text = source.read_text(encoding="utf-8")
          blocks = []
          current = []
          depth = 0
          started = False

          for line in text.splitlines(keepends=True):
              stripped = line.lstrip()
              if not started and re.match(r"(upstream|map|server)\b", stripped):
                  started = True
              if started:
                  current.append(line)
                  depth += line.count("{") - line.count("}")
                  if depth == 0:
                      block = "".join(current).strip() + "\n"
                      if block:
                          blocks.append(block)
                      current = []
                      started = False

          for existing in conf_dir.glob("legacy-*.conf"):
              existing.unlink()

          skipped = re.compile(r"server_name\s+[^;]*(?:xomnghien\.com|inventory\.xomnghien\.com)", re.I)
          upstream_name = re.compile(r"^\s*upstream\s+([A-Za-z0-9_.-]+)\s*{")
          upstream_server = re.compile(r"^\s*server\s+([^:;\s]+)", re.M)
          proxy_pass = re.compile(r"proxy_pass\s+http://([A-Za-z0-9_.-]+)")
          bad_upstreams = set()
          kept_blocks = []

          for block in blocks:
              match = upstream_name.search(block)
              if match is None:
                  kept_blocks.append(block)
                  continue
              hosts = upstream_server.findall(block)
              if hosts and any(host not in available_aliases for host in hosts):
                  bad_upstreams.add(match.group(1))
                  continue
              kept_blocks.append(block)

          index = 10
          for block in kept_blocks:
              if skipped.search(block):
                  continue
              if any(name in bad_upstreams for name in proxy_pass.findall(block)):
                  continue
              (conf_dir / f"legacy-{index:03d}.conf").write_text(block, encoding="utf-8")
              index += 10

          marker.write_text("ok\n", encoding="utf-8")
          PY
          fi

          cat > nginx/conf.d/20-xomnghien.conf <<'NGINX'
          upstream xn_web_upstream {
              server xn-web:3000 fail_timeout=5s max_fails=3;
              keepalive 16;
          }

          upstream xn_inventory_upstream {
              server inventory:3000 fail_timeout=5s max_fails=3;
              keepalive 16;
          }

          server {
              listen 80;
              server_name xomnghien.com;

              location / {
                  proxy_pass http://xn_web_upstream;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection $connection_upgrade;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                  proxy_connect_timeout 1s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 65s;
                  proxy_buffering off;
                  proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
              }
          }

          server {
              listen 80;
              server_name inventory.xomnghien.com;

              location / {
                  proxy_pass http://xn_inventory_upstream;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection $connection_upgrade;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto https;
                  proxy_connect_timeout 1s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 65s;
                  proxy_buffering off;
                  proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
              }
          }
          NGINX

          cat > compose.yml <<'COMPOSE'
          services:
            web:
              image: ${WEB_IMAGE:-ghcr.io/monokaijs/xom-nghien-web-web:latest}
              container_name: xn-web
              restart: unless-stopped
              env_file:
                - ./env/web.env
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
                inventory:
                  condition: service_started
              networks:
                - shared-network

            spawner:
              image: ${SPAWNER_IMAGE:-ghcr.io/monokaijs/xom-nghien-web-spawner:latest}
              container_name: xn-spawner
              restart: unless-stopped
              env_file:
                - ./env/spawner.env
              depends_on:
                mysql:
                  condition: service_healthy
                redis:
                  condition: service_healthy
              networks:
                - shared-network

            postgres:
              image: postgres:16
              container_name: postgres
              restart: unless-stopped
              env_file:
                - ./env/postgres.env
              ports:
                - "5443:5432"
              volumes:
                - postgres_data:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
                interval: 10s
                timeout: 5s
                retries: 10
              networks:
                - shared-network

            inventory:
              image: ${INVENTORY_IMAGE:-ghcr.io/monokaijs/xom-nghien-web-inventory-simulator:latest}
              container_name: inventory
              restart: unless-stopped
              env_file:
                - ./env/inventory.env
              depends_on:
                postgres:
                  condition: service_healthy
              networks:
                - shared-network

            mysql:
              image: mysql:8.0-debian
              container_name: cs2-mysql
              command: --default-authentication-plugin=mysql_native_password
              restart: unless-stopped
              env_file:
                - ./env/mysql.env
              volumes:
                - ./mysql_data:/var/lib/mysql
              healthcheck:
                test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
                interval: 10s
                timeout: 5s
                retries: 10
              networks:
                - shared-network
              cap_add:
                - SYS_NICE
              ports:
                - "27044:3306"

            redis:
              image: ghcr.io/valkey-io/valkey:8-alpine
              container_name: xn-redis
              command: ["sh", "-c", "exec valkey-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\""]
              restart: unless-stopped
              env_file:
                - ./env/redis.env
              volumes:
                - redis_data:/data
              healthcheck:
                test: ["CMD-SHELL", "valkey-cli -a \"$${REDIS_PASSWORD}\" ping | grep -q PONG"]
                interval: 10s
                timeout: 5s
                retries: 10
              networks:
                - shared-network

            nginx:
              image: nginx:stable
              container_name: xn-nginx
              restart: unless-stopped
              depends_on:
                - web
                - inventory
              ports:
                - "80:80"
                - "443:443"
              volumes:
                - ./nginx/conf.d:/etc/nginx/conf.d:ro
                - /var/www:/var/www:ro
                - /etc/letsencrypt:/etc/letsencrypt:ro
              networks:
                - shared-network

          volumes:
            postgres_data:
            redis_data:

          networks:
            shared-network:
              external: true
          COMPOSE
          REMOTE

      - name: Pull and restart services
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker network inspect shared-network >/dev/null 2>&1 || docker network create shared-network"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml config >/dev/null"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker run --rm --network shared-network -v \"\$PWD/nginx/conf.d:/etc/nginx/conf.d:ro\" -v /var/www:/var/www:ro -v /etc/letsencrypt:/etc/letsencrypt:ro nginx:stable nginx -t"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml pull"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "for name in xn-web xn-spawner xn-redis; do if [ \"\$(docker inspect \"\$name\" --format '{{ index .Config.Labels \"com.docker.compose.project\" }}' 2>/dev/null || true)\" = \"\" ]; then docker rm -f \"\$name\"; fi; done"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml up -d --remove-orphans"
          tar -C packages/db/migrations -cz . | ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && rm -rf mysql-migrations && mkdir -p mysql-migrations && tar -xz -C mysql-migrations"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && bash -s" <<'REMOTE'
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import ast
          import re
          import subprocess

          values = {}
          for line in Path(".env").read_text(encoding="utf-8").splitlines():
              stripped = line.strip()
              if not stripped or stripped.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              value = value.strip()
              try:
                  parsed = ast.literal_eval(value) if value[:1] in {"'", '"'} else value
              except Exception:
                  parsed = value.strip('"').strip("'")
              values[key.strip()] = str(parsed)

          db_name = values.get("DB_NAME", "")
          db_user = values.get("DB_USER", "")
          db_password = values.get("DB_PASSWORD", "")
          if not re.fullmatch(r"[A-Za-z0-9_]+", db_name):
              raise SystemExit("Invalid DB_NAME")
          if not re.fullmatch(r"[A-Za-z0-9_]+", db_user):
              raise SystemExit("Invalid DB_USER")

          def run_mysql(sql, capture=False):
              return subprocess.run(
                  [
                      "docker", "compose", "-f", "compose.yml", "exec", "-T", "mysql", "sh", "-lc",
                      'mysql --batch --raw --skip-column-names -uroot -p"$MYSQL_ROOT_PASSWORD" "$MYSQL_DATABASE"',
                  ],
                  input=sql,
                  text=True,
                  check=True,
                  capture_output=capture,
              )

          subprocess.run(
              [
                  "docker", "compose", "-f", "compose.yml", "exec", "-T", "mysql", "sh", "-lc",
                  'for i in $(seq 1 30); do mysqladmin ping -h 127.0.0.1 -u root -p"$MYSQL_ROOT_PASSWORD" --silent && exit 0; sleep 2; done; exit 1',
              ],
              check=True,
          )

          escaped_password = db_password.replace("\\", "\\\\").replace("'", "\\'")
          sql = f"CREATE DATABASE IF NOT EXISTS `{db_name}`;\n"
          if db_user != "root":
              sql += (
                  f"CREATE USER IF NOT EXISTS '{db_user}'@'%' IDENTIFIED BY '{escaped_password}';\n"
                  f"ALTER USER '{db_user}'@'%' IDENTIFIED BY '{escaped_password}';\n"
                  f"GRANT ALL PRIVILEGES ON `{db_name}`.* TO '{db_user}'@'%';\n"
                  "FLUSH PRIVILEGES;\n"
              )

          run_mysql(sql)

          migrations_dir = Path("mysql-migrations")
          if migrations_dir.exists():
              run_mysql(
                  "CREATE TABLE IF NOT EXISTS schema_migrations ("
                  "filename VARCHAR(255) PRIMARY KEY, "
                  "applied_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP NOT NULL"
                  ");\n"
              )
              applied = set(
                  run_mysql("SELECT filename FROM schema_migrations;\n", capture=True).stdout.splitlines()
              )
              for migration in sorted(migrations_dir.glob("*.sql")):
                  if migration.name in applied:
                      continue
                  filename = migration.name.replace("\\", "\\\\").replace("'", "\\'")
                  run_mysql(
                      migration.read_text(encoding="utf-8").rstrip()
                      + f"\nINSERT INTO schema_migrations (filename) VALUES ('{filename}');\n"
                  )
          PY
          REMOTE
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "docker image prune -f"
