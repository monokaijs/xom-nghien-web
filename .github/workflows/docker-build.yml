name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:latest
            ghcr.io/${{ github.repository }}-web:main-${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push spawner
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.spawner
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-spawner:latest
            ghcr.io/${{ github.repository }}-spawner:main-${{ github.sha }}
          cache-from: type=gha,scope=spawner
          cache-to: type=gha,mode=max,scope=spawner

      - name: Build and push inventory
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.inventory-simulator
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-inventory-simulator:latest
            ghcr.io/${{ github.repository }}-inventory-simulator:main-${{ github.sha }}
          cache-from: type=gha,scope=inventory-simulator
          cache-to: type=gha,mode=max,scope=inventory-simulator
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_PATH}"
          test -n "${DEPLOY_SSH_KEY}"
          test -n "${DEPLOY_USER}"
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Pull and restart
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose pull web spawner inventory redis"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose up -d --remove-orphans"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose restart nginx"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "docker image prune -f"
