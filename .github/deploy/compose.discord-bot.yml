services:
  discord-bot:
    image: ghcr.io/monokaijs/xom-nghien-web-discord-bot:latest
    restart: unless-stopped
    networks:
      - shared-network
    env_file:
      - ./env/discord-bot.env
      - ./env/mysql.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
