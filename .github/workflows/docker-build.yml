name: Build and Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-web:latest
            ghcr.io/${{ github.repository }}-web:main-${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push inventory
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.inventory-simulator
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-inventory-simulator:latest
            ghcr.io/${{ github.repository }}-inventory-simulator:main-${{ github.sha }}
          cache-from: type=gha,scope=inventory-simulator
          cache-to: type=gha,mode=max,scope=inventory-simulator
          build-args: |
            SOURCE_COMMIT=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MATCHZY_UPLOAD_TOKEN: ${{ secrets.MATCHZY_UPLOAD_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_PATH}"
          test -n "${DEPLOY_SSH_KEY}"
          test -n "${DEPLOY_USER}"
          test -n "${MATCHZY_UPLOAD_TOKEN}"
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Prepare MatchZy demo storage and schema
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_PATH}/env' '${DEPLOY_PATH}/mysql-migrations'"
          printf 'MATCHZY_UPLOAD_TOKEN=%s\nMATCH_DEMO_STORAGE_DIR=/app/storage/match-demos\n' \
            "${MATCHZY_UPLOAD_TOKEN}" \
            | ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
                "umask 077; cat > '${DEPLOY_PATH}/env/matchzy.env'"
          scp -i ~/.ssh/deploy_key .github/deploy/compose.matchzy.yml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/compose.matchzy.yml"
          scp -i ~/.ssh/deploy_key .github/deploy/configure-matchzy-nginx.py \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/configure-matchzy-nginx.py"
          scp -i ~/.ssh/deploy_key packages/db/migrations/017_add_matchzy_demos.sql \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/mysql-migrations/017_add_matchzy_demos.sql"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && chmod 600 env/matchzy.env && python3 configure-matchzy-nginx.py && docker compose -f compose.yml -f compose.matchzy.yml config >/dev/null && docker compose -f compose.yml -f compose.matchzy.yml up -d mysql && docker compose -f compose.yml -f compose.matchzy.yml exec -T mysql sh -lc 'for i in \$(seq 1 30); do mysqladmin ping -h 127.0.0.1 -u root -p\"\$MYSQL_ROOT_PASSWORD\" --silent && exit 0; sleep 2; done; exit 1' && docker compose -f compose.yml -f compose.matchzy.yml exec -T mysql sh -lc 'exec mysql -u\"\$MYSQL_USER\" -p\"\$MYSQL_PASSWORD\" \"\$MYSQL_DATABASE\"' < mysql-migrations/017_add_matchzy_demos.sql"

      - name: Pull and restart
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml -f compose.matchzy.yml pull web inventory"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml -f compose.matchzy.yml up -d --remove-orphans web inventory nginx"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml -f compose.matchzy.yml rm -sf spawner redis || true"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${DEPLOY_PATH}' && docker compose -f compose.yml -f compose.matchzy.yml exec -T nginx nginx -t && docker compose -f compose.yml -f compose.matchzy.yml restart nginx"
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "docker image prune -f"
